<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RelayKit — Home Messages section (category-pills browser) — MOCKUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Real dark+gold tokens from marketing-site/app/globals.css (dark mode). */
  :root{
    --page:#13120E; --surface-page:#16130F; --surface-card:#181511; --surface-inset:#1E1A15;
    --border:#292524; --border-strong:#44403C; --border-faint:#1C1917;
    --text:#FAFAF9; --text-2:#D7D3D0; --text-3:#A9A29D; --text-4:#79716B;
    --gold:#E0B010; --ink-on-gold:#13120E; --success:#17B26A; --loss:#E0564D;
    --radius-md:8px; --radius-lg:12px; --maxw:1024px;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--page); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased;}
  .sec{padding:76px 0; border-top:1px solid var(--border);}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px;}
  .eyebrow{display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px; font-weight:500; text-transform:uppercase; letter-spacing:0.18em; color:var(--text-3);}
  .eyebrow .dot{width:6px; height:6px; border-radius:2px; background:var(--gold); flex-shrink:0;}
  .sechead{margin-bottom:14px;}
  .sechead h2{font-size:clamp(26px,3.4vw,34px); font-weight:700; line-height:1.12; margin:14px 0 0; max-width:18em;}
  .bridge{max-width:40em; font-size:16px; color:var(--text-2); line-height:1.6; margin:0 0 26px;}

  /* Controls row: business-name input + tone pills */
  .bizline{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:16px;}
  .bizline input{background:var(--surface-inset); border:1px solid var(--border-strong); border-radius:var(--radius-md); color:var(--text); font-family:var(--sans); font-size:16px; padding:12px 16px; width:320px; max-width:100%; transition:border-color .12s;}
  .bizline input:focus{outline:none; border-color:var(--gold);}
  .bizline input::placeholder{color:var(--text-4);}
  .tones{display:flex; gap:7px;}
  .tone{font-family:var(--sans); font-size:12.5px; font-weight:500; padding:7px 14px; border-radius:999px; cursor:pointer; background:transparent; color:var(--text-3); border:1px solid var(--border-strong); transition:background .12s,color .12s;}
  /* Selected tone = MONOCHROMATIC neutral fill (NOT gold) */
  .tone.active{background:var(--border-strong); color:var(--text); border-color:var(--border-strong);}

  /* Category selector — desktop: two pill rows (4 + 5); mobile (<=640): a dropdown */
  .catpills{display:flex; flex-direction:column; gap:8px; margin-bottom:32px;}
  .catrow{display:flex; flex-wrap:wrap; gap:8px;}
  .cat{font-family:var(--sans); font-size:13px; font-weight:500; padding:8px 15px; border-radius:999px; cursor:pointer; background:transparent; color:var(--text-3); border:1px solid var(--border); transition:background .12s,color .12s,border-color .12s;}
  .cat:hover{color:var(--text-2); border-color:var(--border-strong);}
  /* Selected category = PRIMARY YELLOW (yellow is reserved for category selection) */
  .cat.active{background:var(--gold); color:var(--ink-on-gold); border-color:var(--gold);}
  .cat.active:hover{color:var(--ink-on-gold);}
  .catselect{display:none; width:100%; margin-bottom:32px; background:var(--surface-inset); border:1px solid var(--border-strong); border-radius:var(--radius-md); color:var(--text); font-family:var(--sans); font-size:16px; padding:12px 14px;}
  @media(max-width:640px){ .catpills{display:none;} .catselect{display:block;} }

  /* Carousel — fixed height fitting exactly 6 cards (2 cols x 3 rows), paginated. No gradient. */
  .msgrid{display:grid; grid-template-columns:1fr; gap:14px; align-content:start;}
  @media(min-width:720px){ .msgrid{grid-template-columns:1fr 1fr; grid-auto-rows:122px; height:394px; overflow:hidden;} }
  .msgcard{background:var(--surface-inset); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; overflow:hidden;}
  .msgcard .label{font-size:13px; font-weight:600; color:var(--text); margin-bottom:8px; display:flex; align-items:center; gap:8px;}
  .msgcard .label .pip{width:6px; height:6px; border-radius:2px; background:var(--gold); flex:none;}
  .msgcard .text{font-size:13.5px; line-height:1.5; color:var(--text-2); display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
  .msgcard .text .v{color:var(--text); font-weight:500;}

  /* Footer: centered page dots + bottom-right Open Messages link */
  .msgfoot{position:relative; display:flex; align-items:center; justify-content:center; min-height:26px; margin-top:20px;}
  .dots{display:flex; gap:9px;}
  .dot{width:8px; height:8px; border-radius:999px; background:var(--border-strong); border:none; padding:0; cursor:pointer; transition:background .12s;}
  .dot.active{background:var(--text-2);}
  .goldlink{position:absolute; right:0; top:50%; transform:translateY(-50%); color:var(--gold); font-weight:500; font-size:14px; text-decoration:none;}
  .goldlink:hover{opacity:.9;}

  .note{max-width:var(--maxw); margin:0 auto; padding:18px 24px 40px; font-family:var(--mono); font-size:11px; color:var(--text-4); letter-spacing:.04em;}
</style>
</head>

<section class="sec">
  <div class="wrap">
    <div class="sechead">
      <span class="eyebrow"><span class="dot" aria-hidden="true"></span>The messages</span>
      <h2>Messages for every job.</h2>
    </div>
    <p class="bridge">From login codes to event invites, every message your app sends is ready to use.</p>

    <select class="catselect" id="catselect" aria-label="Message category"></select>
    <div class="catpills" id="catpills" role="group" aria-label="Message category">
      <div class="catrow" id="catrow1"></div>
      <div class="catrow" id="catrow2"></div>
    </div>

    <div class="bizline">
      <input id="bizname" type="text" placeholder="Add your business name" maxlength="24" autocomplete="off" aria-label="See the messages as your business">
      <div class="tones" id="tones" role="group" aria-label="Message tone">
        <button class="tone active" type="button" data-tone="Standard">Standard</button>
        <button class="tone" type="button" data-tone="Friendly">Friendly</button>
        <button class="tone" type="button" data-tone="Brief">Brief</button>
      </div>
    </div>

    <div class="msgrid" id="msgGrid"></div>

    <div class="msgfoot">
      <div class="dots" id="dots" role="tablist" aria-label="Message pages"></div>
      <a class="goldlink" href="/messages">Open Messages →</a>
    </div>
  </div>
</section>

    { t:"Moderation update", S:"{{community_name}}: an important update for the community. Details here: {{update_link}} Reply STOP to opt out.", F:"Your {{community_name}} community has an update that needs your attention: {{update_link}} Reply STOP to opt out.", B:"{{community_name}}: important community update. {{update_link}} STOP to opt out." },

// Display order (Verification is 4th, not 1st). Top row = first 4, bottom row = next 5.
const ORDER = ["account-events","order-updates","appointments","verification","customer-support","team-alerts","waitlist","community","marketing"];
const ORDERED = ORDER.map(id => CATS.find(c => c.id === id));
const PER_PAGE = 6;
const DEFAULT_CAT = "account-events"; // default selection (5 messages → 1 page, no dots)
let selCat = DEFAULT_CAT, selTone = "Standard", curPage = 0;
function curCat(){ return CATS.find(c => c.id === selCat); }
function pages(){ const m = curCat().messages, out = []; for(let i=0;i<m.length;i+=PER_PAGE) out.push(m.slice(i, i+PER_PAGE)); return out; }

const esc = (s) => s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function render(body){
  const biz = (document.getElementById("bizname").value.trim()) || "Acme";
  // Split on tokens, keep them, substitute. Every {{token}} value (identity AND
  // all others) gets the .v bold/bright treatment; literal copy stays plain.
  return body.split(/(\{\{\w+\}\})/g).filter(Boolean).map(part => {
    const m = part.match(/^\{\{(\w+)\}\}$/);
    if(!m) return esc(part);
    const key = m[1];
    const val = IDENTITY.includes(key) ? biz : (EX[key] !== undefined ? EX[key] : key);
    return '<span class="v">' + esc(val) + '</span>';
  }).join("");
}

function paintCats(){
  const pill = c => `<button class="cat${c.id===selCat?" active":""}" type="button" data-cat="${c.id}" aria-pressed="${c.id===selCat}">${esc(c.name)}</button>`;
  document.getElementById("catrow1").innerHTML = ORDERED.slice(0,4).map(pill).join("");
  document.getElementById("catrow2").innerHTML = ORDERED.slice(4).map(pill).join("");
  document.getElementById("catselect").innerHTML = ORDERED.map(c =>
    `<option value="${c.id}"${c.id===selCat?" selected":""}>${esc(c.name)}</option>`).join("");
}

function paintGrid(){
  const pg = pages();
  if(curPage > pg.length - 1) curPage = 0;
  const cards = (pg[curPage] || []).map(msg => {
    const body = msg[selTone[0]]; // S / F / B
    return `<div class="msgcard"><div class="label"><span class="pip" aria-hidden="true"></span>${esc(msg.t)}</div><div class="text">${render(body)}</div></div>`;
  });
  document.getElementById("msgGrid").innerHTML = cards.join("");
  paintDots(pg.length);
}

function paintDots(n){
  const dots = document.getElementById("dots");
  if(n <= 1){ dots.innerHTML = ""; return; } // dots only when there's more than one page
  dots.innerHTML = Array.from({length:n}, (_,i) =>
    `<button class="dot${i===curPage?" active":""}" type="button" data-page="${i}" aria-label="Page ${i+1} of ${n}" aria-selected="${i===curPage}"></button>`
  ).join("");
}

function setCat(id){ selCat = id; curPage = 0; paintCats(); paintGrid(); }
function setPage(i){ const n = pages().length; curPage = Math.max(0, Math.min(n-1, i)); paintGrid(); }

document.getElementById("catpills").addEventListener("click", e => { const b = e.target.closest(".cat"); if(b) setCat(b.dataset.cat); });
document.getElementById("catselect").addEventListener("change", e => setCat(e.target.value));
document.getElementById("dots").addEventListener("click", e => { const b = e.target.closest(".dot"); if(b) setPage(+b.dataset.page); });
document.getElementById("tones").addEventListener("click", e => {
  const b = e.target.closest(".tone"); if(!b) return;
  selTone = b.dataset.tone;
  document.querySelectorAll("#tones .tone").forEach(t => t.classList.toggle("active", t === b));
  paintGrid();
});
document.getElementById("bizname").addEventListener("input", paintGrid);

// swipe to advance pages
const grid = document.getElementById("msgGrid");
let tx = 0;
grid.addEventListener("touchstart", e => { tx = e.changedTouches[0].clientX; }, {passive:true});
grid.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx) > 40) setPage(curPage + (dx < 0 ? 1 : -1));
}, {passive:true});

paintCats();
paintGrid();
</script>
